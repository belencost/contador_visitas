name: Integracion Continua (CI)

# Esto le dice a GitHub que corra este script cada vez que alguien sube código a la rama principal
on:
  push:
    branches: [ main ]

jobs:
  pruebas:
    # Esto levanta una "computadora virtual" con Linux en los servidores de GitHub
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar pruebas automatizadas
      run: |
        python -m pytest